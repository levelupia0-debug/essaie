<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Level IA - Maintenance</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');

        :root {
            --brand-purple: #8b5cf6;
        }

        body {
            background-color: #020202;
            font-family: 'Inter', sans-serif;
            /* Empêche tout scroll */
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Animation de rotation fluide */
        @keyframes rotate-360 {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .animate-star {
            animation: rotate-360 12s linear infinite;
        }

        /* Violet Équilibré (moins agressif) */
        .star-neon {
            color: var(--brand-purple);
            filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.4)) drop-shadow(0 0 20px rgba(139, 92, 246, 0.2));
        }

        /* Transition de texte */
        .fade-container {
            transition: opacity 0.6s ease-in-out, transform 0.6s ease-in-out;
        }
        
        .hidden-content {
            opacity: 0;
            transform: translateY(5px);
        }

        /* Bouton Premium */
        .btn-premium {
            background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.2);
        }

        .btn-premium:hover {
            box-shadow: 0 0 25px rgba(124, 58, 237, 0.5);
            transform: scale(1.02);
        }

        /* Adaptation automatique de la taille du contenu pour éviter le scroll */
        .main-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
            max-height: 90vh;
        }
    </style>
</head>
<body class="text-white">

    <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,_rgba(124,58,237,0.05),transparent_70%)] pointer-events-none"></div>

    <div class="relative z-10 w-full max-w-lg px-6 text-center main-card">
        
        <!-- Étoile Violette -->
        <div class="mb-6 md:mb-10 flex-shrink-0">
            <svg class="animate-star star-neon w-20 h-20 md:w-28 md:h-28 mx-auto" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 .587l3.668 7.431 8.2 1.192-5.934 5.787 1.4 8.168L12 18.896l-7.334 3.869 1.4-8.168-5.934-5.787 8.2-1.192L12 .587z"/>
            </svg>
        </div>

        <!-- Textes Dynamiques -->
        <div id="lang-container" class="fade-container flex-shrink-0">
            <h1 id="ui-title" class="text-3xl md:text-5xl font-black mb-4 tracking-tight leading-tight">
                Revenez plus tard
            </h1>
            
            <div id="ui-body" class="text-gray-400 text-base md:text-lg font-light leading-relaxed mb-6 md:mb-8">
                <p>
                    <span class="text-violet-500 font-bold">Level IA</span> est actuellement en cours de développement. 
                    Nous préparons quelque chose d'exceptionnel pour vous.
                </p>
            </div>
            
            <p id="ui-notify" class="text-violet-400/60 text-xs md:text-sm font-medium italic mb-8 md:mb-10">
                Vous serez notifié une fois que la mise à jour sera prête.
            </p>
        </div>

        <!-- Bouton Action -->
        <div class="space-y-4 flex-shrink-0">
            <p id="ui-hint" class="text-[9px] md:text-[10px] uppercase tracking-[0.2em] text-gray-500 font-bold">
                Maintenance
            </p>
            <a id="ui-btn" href="https://levelupia0-debug.github.io/levelupia/" 
               target="_blank"
               class="btn-premium inline-block w-full sm:w-auto px-8 py-3.5 md:px-10 md:py-4 rounded-full font-bold text-xs md:text-sm">
                Obtenir votre clé maintenance
            </a>
        </div>

        <!-- Les 3 Bullets -->
        <div class="mt-10 md:mt-16 flex justify-center space-x-3 flex-shrink-0">
            <div class="w-1.5 h-1.5 rounded-full bg-violet-900 animate-pulse"></div>
            <div class="w-1.5 h-1.5 rounded-full bg-violet-700 animate-pulse" style="animation-delay: 0.2s"></div>
            <div class="w-1.5 h-1.5 rounded-full bg-violet-500 animate-pulse" style="animation-delay: 0.4s"></div>
        </div>
    </div>

    <script>
        const content = [
            {
                title: "Revenez plus tard",
                body: "Level IA est actuellement en cours de développement. Nous préparons quelque chose d'exceptionnel pour vous.",
                notify: "Vous serez notifié une fois que la mise à jour sera prête.",
                hint: "Maintenance",
                btn: "Obtenir votre clé maintenance"
            },
            {
                title: "Come back later",
                body: "Level IA is currently under development. We are preparing something exceptional for you.",
                notify: "You will be notified once the update is ready.",
                hint: "Maintenance",
                btn: "Get your maintenance key"
            }
        ];

        let idx = 0;
        const container = document.getElementById('lang-container');
        const hint = document.getElementById('ui-hint');
        const btn = document.getElementById('ui-btn');

        function updateUI() {
            container.classList.add('hidden-content');
            hint.style.opacity = "0";
            btn.style.opacity = "0";

            setTimeout(() => {
                idx = (idx + 1) % content.length;
                const d = content[idx];

                document.getElementById('ui-title').textContent = d.title;
                // On s'assure que Level IA reste en VIOLET dans la version injectée
                document.getElementById('ui-body').innerHTML = `<p><span class="text-violet-500 font-bold">Level IA</span> ${d.body.split('Level IA')[1]}</p>`;
                document.getElementById('ui-notify').textContent = d.notify;
                hint.textContent = d.hint;
                btn.textContent = d.btn;

                container.classList.remove('hidden-content');
                hint.style.opacity = "1";
                btn.style.opacity = "1";
            }, 600);
        }

        setInterval(updateUI, 10000);
        hint.style.transition = "opacity 0.6s ease";
        btn.style.transition = "all 0.3s ease, opacity 0.6s ease";

        // LOGIQUE PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.update();
                }
            });
        }
    </script>
</body>
</html>
