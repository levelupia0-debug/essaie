<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Thiab's</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, getDocs, deleteDoc, setDoc, getDoc, limit } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAFNuErJ2ToXYJ9vg0YwAneeOSty6mtXNg",
            authDomain: "thiab-s-ia.firebaseapp.com",
            projectId: "thiab-s-ia",
            storageBucket: "thiab-s-ia.firebasestorage.app",
            messagingSenderId: "685257281739",
            appId: "1:685257281739:web:76f60907cd9c87d2c04b4e",
            measurementId: "G-Z1T4LLG22Z"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.auth = auth;
        window.db = db;
        window.GoogleAuthProvider = GoogleAuthProvider;
        window.signInWithPopup = signInWithPopup;
        window.onAuthStateChanged = onAuthStateChanged;
        window.firestoreUtils = { collection, addDoc, query, orderBy, onSnapshot, doc, getDocs, deleteDoc, setDoc, getDoc, limit };
        window.__app_id = "thiab-s-app-v3"; 
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root { --primary: #a855f7; --dark: #020202; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--dark); color: #ffffff; height: 100dvh; margin: 0; display: flex; flex-direction: column; overflow: hidden; }
        .bg-main { background: radial-gradient(circle at 50% 0%, #0d061a 0%, #020202 100%); }

        #splashScreen { position: fixed; inset: 0; z-index: 10000; background: black; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: opacity 0.8s ease-out; pointer-events: none; }
        .splash-text { font-size: 1.8rem; font-weight: 900; letter-spacing: 0.6em; text-transform: uppercase; opacity: 0; position: absolute; transform: scale(0.85); filter: blur(15px); transition: all 0.9s cubic-bezier(0.16, 1, 0.3, 1); text-align: center; }
        .splash-text.active { opacity: 1; transform: scale(1); filter: blur(0px); }
        .splash-text.exit { opacity: 0; transform: scale(1.2); filter: blur(30px); }

        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); }
        #sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 4000; }
        
        #userInput { background: transparent !important; border: none !important; color: white !important; outline: none !important; width: 100%; padding: 12px; font-size: 16px !important; min-height: 44px; max-height: 120px; display: block; resize: none; overflow-y: hidden; }
        .message-bubble { max-width: 88%; animation: msgIn 0.4s cubic-bezier(0.1, 0.9, 0.2, 1); }
        @keyframes msgIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .star-logo { animation: rotate360 8s linear infinite; color: #a855f7; filter: drop-shadow(0 0 8px rgba(168, 85, 247, 0.6)); }
        @keyframes rotate360 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .typing-dots span { width: 3px; height: 3px; background: #a855f7; border-radius: 50%; display: inline-block; animation: typing 1.4s infinite; }
        @keyframes typing { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }

        .chat-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); transition: all 0.2s; }
        .chat-item:hover { background: rgba(168, 85, 247, 0.1); border-color: var(--primary); }

        .google-btn {
            background: #ffffff;
            color: #1f1f1f;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-main">

    <!-- SPLASH SCREEN -->
    <div id="splashScreen">
        <div id="splash1" class="splash-text text-purple-500"><strong>Thiab's</strong> IA</div>
        <div id="splash2" class="splash-text text-white"><strong>LevelUp</strong></div>
    </div>

    <!-- AUTH PAGE -->
    <div id="authPage" class="hidden fixed inset-0 z-[5000] flex items-center justify-center p-8 bg-black">
        <div class="w-full max-w-sm text-center">
            <i class="fas fa-star text-5xl star-logo mb-10 block"></i>
            <h1 class="text-2xl font-bold tracking-[0.4em] text-white uppercase mb-12"><strong>Thiab's</strong></h1>
            <button id="googleLogin" class="google-btn w-full py-4 rounded-2xl flex items-center justify-center gap-4 text-sm tracking-wide shadow-sm">
                <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Continuer avec Google
            </button>
            <p class="text-[8px] text-white/20 uppercase tracking-widest mt-8">Propulsé par <strong>LevelUp</strong></p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="hidden flex-col h-full w-full relative">
        <div id="appOverlay" class="fixed inset-0 z-[2999] hidden bg-black/40"></div>

        <div id="sidebar" class="fixed inset-y-0 right-0 w-[85%] md:w-80 glass border-l border-white/10 p-6 flex flex-col transition-transform translate-x-full no-scrollbar overflow-y-auto">
            <div class="flex items-center justify-between mb-8">
                <span class="text-[10px] font-black uppercase tracking-widest opacity-40">Menu</span>
                <button id="closeSidebar" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-white/5"><i class="fas fa-times text-xs"></i></button>
            </div>
            <div id="userCard" class="p-4 rounded-2xl bg-white/5 border border-white/5 mb-8 flex items-center gap-4">
                <div id="userAvatar" class="w-10 h-10 rounded-full bg-purple-500/20 flex items-center justify-center overflow-hidden border border-white/10">
                    <i class="fas fa-user text-xs"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <p id="userName" class="text-[10px] font-black uppercase truncate">Utilisateur</p>
                    <p id="userMail" class="text-[9px] text-white/40 truncate">---</p>
                </div>
            </div>
            <div class="space-y-6">
                <div class="space-y-2">
                    <div class="flex justify-between items-center text-[9px] font-black uppercase tracking-widest opacity-40">
                        <span>Espace Cloud</span>
                        <span id="storageLabel">0%</span>
                    </div>
                    <div class="h-1 bg-white/10 rounded-full overflow-hidden"><div id="storageBar" class="h-full bg-purple-500 transition-all duration-500" style="width: 0%"></div></div>
                </div>
                <div class="space-y-3">
                    <h4 class="text-[9px] font-black uppercase tracking-widest opacity-40">Historique</h4>
                    <div id="historyList" class="space-y-2 max-h-60 overflow-y-auto no-scrollbar"></div>
                </div>
                <div class="pt-4 border-t border-white/5 space-y-4">
                    <textarea id="customDNA" placeholder="DNA de Thiab's..." class="w-full h-24 bg-white/5 border border-white/10 rounded-xl p-3 text-[10px] text-white outline-none focus:border-purple-500 resize-none"></textarea>
                    <button id="saveDNA" class="w-full py-2.5 bg-purple-600 rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-purple-500 transition-all">Mettre à jour</button>
                    <button id="logoutBtn" class="w-full py-4 text-[9px] font-black uppercase tracking-widest opacity-30 hover:opacity-100">Déconnexion</button>
                </div>
            </div>
        </div>

        <header class="px-6 py-5 flex items-center justify-between border-b border-white/5 bg-black/40 backdrop-blur-2xl z-40">
            <div class="flex items-center gap-4">
                <i class="fas fa-star text-xl star-logo"></i>
                <div>
                    <h2 class="text-sm font-black uppercase tracking-widest"><strong>Thiab's</strong></h2>
                    <p class="text-[9px] font-bold text-white/30 uppercase">Membre <strong>LevelUp</strong></p>
                </div>
            </div>
            <button id="openSidebar" class="w-10 h-10 rounded-xl flex flex-col items-center justify-center gap-1.5 hover:bg-white/5 transition-all">
                <span class="w-4 h-0.5 bg-white rounded-full"></span>
                <span class="w-4 h-0.5 bg-white rounded-full opacity-60"></span>
            </button>
        </header>

        <main class="flex-1 overflow-y-auto px-6 py-10 no-scrollbar space-y-10" id="chatArea">
            <div class="max-w-2xl mx-auto space-y-8" id="conversationContainer"></div>
            <div id="aiTyping" class="max-w-2xl mx-auto hidden">
                <div class="flex items-center gap-3"><i class="fas fa-star text-[10px] star-logo opacity-50"></i><div class="typing-dots flex gap-1"><span></span><span></span><span></span></div></div>
            </div>
        </main>

        <footer class="px-4 py-6 border-t border-white/5 bg-[#020202]/90 backdrop-blur-3xl z-50">
            <div class="max-w-2xl mx-auto flex gap-2">
                <div class="flex-1 glass rounded-3xl p-1.5 flex items-end">
                    <textarea id="userInput" placeholder="Dis-moi tout bro..." rows="1" autocomplete="off"></textarea>
                </div>
                <button id="sendBtn" class="w-12 h-12 rounded-2xl bg-white text-black flex items-center justify-center hover:bg-purple-500 hover:text-white transition-all"><i class="fas fa-chevron-up text-xs"></i></button>
            </div>
        </footer>
    </div>

    <script type="module">
        const checkReady = setInterval(() => {
            if (window.auth && window.db && window.onAuthStateChanged) {
                clearInterval(checkReady);
                initApp();
            }
        }, 100);

        function initApp() {
            const { auth, db, firestoreUtils, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } = window;
            const { collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc, setDoc, getDoc } = firestoreUtils;

            const splashScreen = document.getElementById('splashScreen');
            const authPage = document.getElementById('authPage');
            const mainApp = document.getElementById('mainApp');
            const conversationContainer = document.getElementById('conversationContainer');
            const chatArea = document.getElementById('chatArea');
            const userInput = document.getElementById('userInput');
            const sidebar = document.getElementById('sidebar');
            const appOverlay = document.getElementById('appOverlay');

            const MODEL = "gemini-2.5-flash-preview-09-2025";
            const appId = window.__app_id;
            let userId = null;
            let dnaPrompt = "";
            let currentMessages = [];
            let splashDone = false;

            // ANIMATION INTRO
            const s1 = document.getElementById('splash1');
            const s2 = document.getElementById('splash2');
            
            setTimeout(() => s1.classList.add('active'), 500);
            setTimeout(() => { s1.classList.remove('active'); s1.classList.add('exit'); }, 2000);
            setTimeout(() => s2.classList.add('active'), 2500);
            setTimeout(() => { 
                s2.classList.remove('active'); s2.classList.add('exit'); 
                splashScreen.style.opacity = '0';
                setTimeout(() => { 
                    splashScreen.style.display = 'none'; 
                    splashDone = true;
                    checkViewStatus();
                }, 800);
            }, 4000);

            function checkViewStatus() {
                if (!auth.currentUser) {
                    authPage.classList.remove('hidden');
                    mainApp.classList.add('hidden');
                } else {
                    authPage.classList.add('hidden');
                    mainApp.classList.remove('hidden');
                    mainApp.classList.add('flex');
                }
            }

            // AUTH LOGIC
            document.getElementById('googleLogin').onclick = async () => {
                try {
                    const provider = new GoogleAuthProvider();
                    await signInWithPopup(auth, provider);
                } catch (e) { console.error("Login Failed:", e); }
            };

            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    userId = user.uid;
                    document.getElementById('userName').innerText = user.displayName || "Membre";
                    document.getElementById('userMail').innerText = user.email || "Compte lié";
                    if (user.photoURL) document.getElementById('userAvatar').innerHTML = `<img src="${user.photoURL}" class="w-full h-full object-cover">`;
                    
                    // On force l'affichage de l'app si connecté, même si le splash tourne encore
                    if (splashDone) {
                        authPage.classList.add('hidden');
                        mainApp.classList.remove('hidden');
                        mainApp.classList.add('flex');
                    }

                    const dnaDoc = await getDoc(doc(db, "artifacts", appId, "users", userId, "settings", "dna"));
                    if (dnaDoc.exists()) {
                        dnaPrompt = dnaDoc.data().prompt;
                        document.getElementById('customDNA').value = dnaPrompt;
                    }
                    setupHistoryListener();
                } else {
                    if (splashDone) {
                        authPage.classList.remove('hidden');
                        mainApp.classList.add('hidden');
                    }
                }
            });

            function setupHistoryListener() {
                const q = query(collection(db, "artifacts", appId, "users", userId, "chats"), orderBy("timestamp", "asc"));
                onSnapshot(q, (snap) => {
                    const messages = [];
                    let totalSize = 0;
                    document.getElementById('historyList').innerHTML = '';

                    snap.forEach(d => {
                        const data = d.data();
                        messages.push({id: d.id, ...data});
                        totalSize += JSON.stringify(data).length;

                        const item = document.createElement('div');
                        item.className = "chat-item p-3 rounded-xl flex items-center justify-between cursor-pointer";
                        item.innerHTML = `<div class="flex-1 truncate text-[9px] font-bold">${data.user}</div><i class="fas fa-trash text-[7px] opacity-20 hover:text-red-500 p-2"></i>`;
                        item.onclick = (e) => {
                            if (e.target.classList.contains('fa-trash')) {
                                deleteDoc(doc(db, "artifacts", appId, "users", userId, "chats", d.id));
                            } else {
                                conversationContainer.innerHTML = '';
                                displayUserMessage(data.user);
                                displayAIMessage(data.ai, true);
                                sidebar.classList.add('translate-x-full');
                                appOverlay.classList.add('hidden');
                            }
                        };
                        document.getElementById('historyList').appendChild(item);
                    });

                    const perc = Math.min((totalSize / 300000) * 100, 100);
                    document.getElementById('storageBar').style.width = perc + '%';
                    document.getElementById('storageLabel').innerText = Math.round(perc) + '%';

                    if (messages.length === 0) {
                        conversationContainer.innerHTML = '';
                        displayAIMessage("Salut bro ! Je suis **Thiab's** IA, prête à t'aider. Dis-moi tout !", true);
                    } else if (messages.length > currentMessages.length) {
                        const last = messages[messages.length - 1];
                        if (last.newlyAdded) displayAIMessage(last.ai, true);
                        else refreshConversation(messages);
                    }
                    currentMessages = messages;
                });
            }

            function refreshConversation(msgs) {
                conversationContainer.innerHTML = '';
                msgs.forEach(m => { displayUserMessage(m.user); displayAIMessage(m.ai, false); });
                chatArea.scrollTop = chatArea.scrollHeight;
            }

            document.getElementById('openSidebar').onclick = () => {
                sidebar.classList.remove('translate-x-full');
                appOverlay.classList.remove('hidden');
            };
            document.getElementById('closeSidebar').onclick = () => {
                sidebar.classList.add('translate-x-full');
                appOverlay.classList.add('hidden');
            };
            appOverlay.onclick = () => {
                sidebar.classList.add('translate-x-full');
                appOverlay.classList.add('hidden');
            };

            document.getElementById('saveDNA').onclick = async () => {
                dnaPrompt = document.getElementById('customDNA').value;
                await setDoc(doc(db, "artifacts", appId, "users", userId, "settings", "dna"), { prompt: dnaPrompt });
                document.getElementById('saveDNA').innerText = "✓ Enregistré";
                setTimeout(() => document.getElementById('saveDNA').innerText = "Mettre à jour", 2000);
            };

            document.getElementById('logoutBtn').onclick = () => auth.signOut();

            function displayUserMessage(text) {
                const div = document.createElement('div');
                div.className = "flex justify-end";
                div.innerHTML = `<div class="bg-white/5 border border-white/10 px-6 py-3 rounded-2xl text-sm max-w-[88%]">${text}</div>`;
                conversationContainer.appendChild(div);
                chatArea.scrollTop = chatArea.scrollHeight;
            }

            function displayAIMessage(text, animate) {
                const content = document.createElement('div');
                content.className = "prose prose-invert prose-sm text-slate-300 max-w-[88%] mb-4";
                conversationContainer.appendChild(content);
                if (animate) {
                    let i = 0;
                    const interval = setInterval(() => {
                        if (i < text.length) {
                            content.innerHTML = marked.parse(text.substring(0, i + 1));
                            i += 4; chatArea.scrollTop = chatArea.scrollHeight;
                        } else {
                            content.innerHTML = marked.parse(text);
                            clearInterval(interval);
                        }
                    }, 10);
                } else {
                    content.innerHTML = marked.parse(text);
                }
            }

            async function send() {
                const val = userInput.value.trim();
                if (!val || !userId) return;
                userInput.value = ''; userInput.style.height = '44px';
                displayUserMessage(val);
                document.getElementById('aiTyping').classList.remove('hidden');
                chatArea.scrollTop = chatArea.scrollHeight;

                const corePrompt = `Tu es **Thiab's** IA, créée par **Thiab's** et développée par **LevelUp**. ADN : ${dnaPrompt}.`;

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: val }] }], systemInstruction: { parts: [{ text: corePrompt }] } })
                    });
                    const data = await res.json();
                    const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Erreur réseau bro.";
                    document.getElementById('aiTyping').classList.add('hidden');
                    await addDoc(collection(db, "artifacts", appId, "users", userId, "chats"), {
                        user: val, ai: aiText, timestamp: Date.now(), newlyAdded: true
                    });
                } catch (e) {
                    document.getElementById('aiTyping').classList.add('hidden');
                    displayAIMessage("Erreur technique bro.", true);
                }
            }

            userInput.oninput = function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; };
            userInput.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
            document.getElementById('sendBtn').onclick = send;
        }
    </script>
</body>
</html>
