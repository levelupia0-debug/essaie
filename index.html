<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Thiab's</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --primary: #a855f7;
            --dark: #020202;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--dark);
            color: #ffffff;
            height: 100dvh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .bg-main {
            background: radial-gradient(circle at 50% 0%, #0d061a 0%, #020202 100%);
        }

        /* --- CINEMATIC INTRO --- */
        #splashScreen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 1s ease-out;
        }

        .splash-text {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            opacity: 0;
            position: absolute;
            transform: scale(0.85);
            filter: blur(15px);
            transition: all 0.9s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: center;
        }

        .splash-text.active { opacity: 1; transform: scale(1); filter: blur(0px); }
        .splash-text.exit { opacity: 0; transform: scale(1.2); filter: blur(30px); }

        /* --- LANGUAGE SELECTOR --- */
        #langSelector {
            position: fixed;
            inset: 0;
            z-index: 8000;
            background: black;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .lang-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            max-width: 300px;
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .lang-card:hover {
            transform: translateY(-10px);
            background: rgba(168, 85, 247, 0.1);
            border-color: var(--primary);
        }

        /* --- LOADING OVERLAY --- */
        #loadingOverlay {
            position: fixed;
            inset: 0;
            z-index: 6000;
            background: black;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .loader-bar-container {
            width: 250px;
            height: 2px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 30px;
            position: relative;
        }

        .loader-bar-progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: var(--primary);
            width: 0%;
            box-shadow: 0 0 15px var(--primary);
            transition: width 0.3s ease;
        }

        /* --- INTERFACE --- */
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #userInput {
            background: transparent !important;
            border: none !important;
            color: white !important;
            outline: none !important;
            width: 100%;
            padding: 12px;
            font-size: 16px !important;
            min-height: 44px;
            max-height: 120px;
            display: block;
            resize: none;
            overflow-y: hidden;
        }

        .message-bubble {
            max-width: 88%;
            animation: msgIn 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        @keyframes msgIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .star-logo {
            animation: rotate360 8s linear infinite;
            color: #a855f7;
            filter: drop-shadow(0 0 8px rgba(168, 85, 247, 0.6));
        }

        @keyframes rotate360 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .typing-dots span {
            width: 3px; height: 3px; background: #a855f7; border-radius: 50%;
            display: inline-block; animation: typing 1.4s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }

        .btn-premium {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
    </style>
</head>
<body class="bg-main">

    <!-- 1. INITIAL SPLASH -->
    <div id="splashScreen">
        <div id="splash1" class="splash-text text-purple-500"><strong>Thiab's</strong> IA</div>
        <div id="splash2" class="splash-text text-white"><strong>LevelUp</strong></div>
    </div>

    <!-- 2. LANG SELECTOR -->
    <div id="langSelector">
        <h2 class="text-xs font-black uppercase tracking-[0.5em] text-white/40 mb-12">Select Language</h2>
        <div class="flex flex-col gap-6 w-full items-center">
            <div id="btn-fr" class="lang-card">
                <span class="text-2xl block mb-2">🇫🇷</span>
                <span class="font-bold tracking-widest text-sm">FRANÇAIS</span>
            </div>
            <div id="btn-en" class="lang-card">
                <span class="text-2xl block mb-2">🇺🇸</span>
                <span class="font-bold tracking-widest text-sm">ENGLISH</span>
            </div>
        </div>
    </div>

    <!-- 3. LOGIN PAGE -->
    <div id="authPage" class="hidden fixed inset-0 z-[5000] flex items-center justify-center p-8 bg-black">
        <div class="w-full max-w-sm text-center">
            <i class="fas fa-star text-5xl star-logo mb-10 block"></i>
            <h1 class="text-2xl font-bold tracking-[0.4em] text-white uppercase mb-8"><strong>Thiab's</strong></h1>
            <div class="space-y-4">
                <input type="password" id="pinInput" placeholder="PASSCODE" 
                    class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-6 text-center text-xl font-bold tracking-[0.5em] text-white outline-none focus:border-purple-500/50 transition-all">
                <button id="unlockBtn" class="w-full bg-white text-black py-5 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] hover:bg-purple-500 hover:text-white transition-colors" data-i18n="connectBtn">Connecter</button>
                <button id="getCodeBtn" class="w-full py-2 text-[9px] font-bold uppercase tracking-[0.2em] text-white/30 hover:text-white transition-colors" data-i18n="getCodeBtn">Obtenir mon code</button>
            </div>
        </div>
    </div>

    <!-- 4. POST-AUTH LOADING ANIMATION -->
    <div id="loadingOverlay">
        <div class="text-xl font-black uppercase tracking-[0.5em] text-purple-500"><strong>Thiab's</strong> IA</div>
        <div class="loader-bar-container">
            <div id="postAuthProgress" class="loader-bar-progress"></div>
        </div>
        <div id="loadingStatus" class="mt-6 text-[10px] font-bold uppercase tracking-[0.3em] text-white/30" data-i18n="loading">Chargement...</div>
    </div>

    <!-- 5. MAIN APP -->
    <div id="mainApp" class="hidden flex-col h-full w-full relative">
        <div id="sidebar" class="fixed inset-y-0 right-0 w-80 glass z-[3000] border-l border-white/10 p-8 flex flex-col transition-transform translate-x-full duration-500 no-scrollbar overflow-y-auto">
            <div class="flex items-center justify-between mb-10">
                <span class="text-[10px] font-black uppercase tracking-widest opacity-40" data-i18n="configTitle">Configuration</span>
                <button id="closeSidebar" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-white/5"><i class="fas fa-times text-sm"></i></button>
            </div>
            <div class="space-y-8">
                <div class="space-y-3">
                    <h4 class="text-[9px] font-black uppercase tracking-widest opacity-40" data-i18n="langTitle">Langue du système</h4>
                    <select id="appLangSetting" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-xs text-white outline-none focus:border-purple-500">
                        <option value="fr" class="bg-[#020202]">Français</option>
                        <option value="en" class="bg-[#020202]">English</option>
                    </select>
                </div>

                <div class="p-5 rounded-2xl bg-white/5 border border-white/5">
                    <h4 class="text-[9px] font-black uppercase tracking-widest text-purple-400 mb-4" data-i18n="statusTitle">Statut Utilisateur</h4>
                    <p id="profId" class="text-[10px] font-mono text-white/40 truncate mb-1">ID: ---</p>
                    <p class="text-[10px] font-bold text-green-400 uppercase" data-i18n="statusValue">Premium Authenticated</p>
                </div>
                
                <div class="space-y-3">
                    <h4 class="text-[9px] font-black uppercase tracking-widest opacity-40">Personnalisation (DNA)</h4>
                    <p class="text-[10px] text-white/40 leading-relaxed" data-i18n="dnaHelp">Ceci définit le comportement profond de **Thiab's**.</p>
                    <textarea id="customDNA" placeholder="DNA de l'IA..." class="w-full h-32 bg-white/5 border border-white/10 rounded-xl p-4 text-xs text-white outline-none focus:border-purple-500 transition-all resize-none"></textarea>
                    <button id="saveDNA" class="w-full py-3 bg-purple-600 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-purple-500 transition-all" data-i18n="saveBtn">Mettre à jour l'IA</button>
                </div>

                <div class="pt-6 border-t border-white/5 space-y-4">
                    <button id="clearHistory" class="w-full flex items-center justify-center gap-3 p-4 rounded-xl btn-premium text-red-400">
                        <i class="fas fa-trash-alt text-xs"></i>
                        <span class="text-[10px] font-bold uppercase tracking-widest" data-i18n="clearBtn">Réinitialiser chat</span>
                    </button>
                    <button id="logoutBtn" class="w-full py-4 text-[10px] font-black uppercase tracking-[0.2em] opacity-30 hover:opacity-100 transition-opacity" data-i18n="logoutBtn">Terminer Session</button>
                </div>
            </div>
        </div>

        <header class="px-6 py-5 flex items-center justify-between border-b border-white/5 bg-black/40 backdrop-blur-2xl shrink-0 z-40">
            <div class="flex items-center gap-4">
                <i class="fas fa-star text-xl star-logo"></i>
                <div>
                    <h2 class="text-sm font-black uppercase tracking-widest"><strong>Thiab's</strong></h2>
                    <select id="systemMode" class="bg-transparent text-[9px] font-bold uppercase tracking-tighter text-white/40 outline-none cursor-pointer hover:text-white transition-colors">
                        <option value="normal" class="bg-[#020202]">System: Normal</option>
                        <option value="coach" class="bg-[#020202]">System: Coach</option>
                        <option value="anti-procrastination" class="bg-[#020202]">System: Anti-Procrastination</option>
                    </select>
                </div>
            </div>
            <button id="openSidebar" class="w-12 h-12 rounded-2xl flex flex-col items-center justify-center gap-1.5 hover:bg-white/5 transition-all">
                <span class="w-5 h-0.5 bg-white rounded-full"></span>
                <span class="w-5 h-0.5 bg-white rounded-full opacity-60"></span>
            </button>
        </header>

        <main class="flex-1 overflow-y-auto px-6 py-10 no-scrollbar space-y-10" id="chatArea">
            <div class="max-w-2xl mx-auto space-y-8" id="conversationContainer"></div>
            <div id="aiTyping" class="max-w-2xl mx-auto hidden">
                <div class="flex items-center gap-3">
                    <i class="fas fa-star text-[10px] star-logo opacity-50"></i>
                    <div class="typing-dots flex gap-1"><span></span><span></span><span></span></div>
                </div>
            </div>
        </main>

        <footer class="px-4 py-6 pb-6 border-t border-white/5 bg-[#020202]/90 backdrop-blur-3xl shrink-0 z-50">
            <div class="max-w-2xl mx-auto relative">
                <div class="glass rounded-3xl p-1.5 flex items-end gap-2 focus-within:border-purple-500/40 transition-all shadow-2xl">
                    <div class="flex-1 px-2"><textarea id="userInput" data-placeholder="inputPlaceholder" rows="1" autocomplete="off"></textarea></div>
                    <button id="sendBtn" class="w-12 h-12 rounded-2xl bg-white text-black flex items-center justify-center hover:bg-purple-500 hover:text-white transition-all"><i class="fas fa-chevron-up text-xs"></i></button>
                </div>
                <div class="mt-4 text-center"><span class="text-[9px] font-black uppercase tracking-[0.4em] opacity-20"><strong>LevelUp</strong></span></div>
            </div>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, getDocs, deleteDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : "thiabs-app-v4";

        // Elements
        const splashScreen = document.getElementById('splashScreen');
        const langSelector = document.getElementById('langSelector');
        const authPage = document.getElementById('authPage');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const mainApp = document.getElementById('mainApp');
        const conversationContainer = document.getElementById('conversationContainer');
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const appLangSetting = document.getElementById('appLangSetting');
        const profIdDisplay = document.getElementById('profId');

        // State
        const MODEL = "gemini-2.5-flash-preview-09-2025";
        const apiKey = ""; 
        let user = null;
        let currentMessages = [];
        let dnaPrompt = "";
        let currentLang = "fr";

        const i18n = {
            fr: {
                connectBtn: "Connecter",
                getCodeBtn: "Obtenir mon code",
                loading: "Chargement...",
                configTitle: "Configuration",
                langTitle: "Langue du système",
                statusTitle: "Statut Utilisateur",
                statusValue: "Premium Authenticated",
                dnaHelp: "Ceci définit le comportement profond de **Thiab's**.",
                saveBtn: "Mettre à jour l'IA",
                clearBtn: "Réinitialiser chat",
                logoutBtn: "Terminer Session",
                inputPlaceholder: "Dis-moi tout bro...",
                intro: "Salut bro ! Je suis **Thiab's** IA. Prêt à t'accompagner. Ajuste mes règles dans le DNA si besoin.",
                quotaError: "Système saturé bro. Réessaie après.",
                genError: "Bug technique bro. Réessaie."
            },
            en: {
                connectBtn: "Connect",
                getCodeBtn: "Get my code",
                loading: "Loading...",
                configTitle: "Settings",
                langTitle: "System Language",
                statusTitle: "User Status",
                statusValue: "Premium Authenticated",
                dnaHelp: "This defines **Thiab's** deep behavior.",
                saveBtn: "Update IA",
                clearBtn: "Clear History",
                logoutBtn: "End Session",
                inputPlaceholder: "Tell me everything bro...",
                intro: "Hey bro! I'm **Thiab's** IA. Ready to help you. Adjust my rules in DNA settings.",
                quotaError: "System saturated bro. Try later.",
                genError: "Glitch bro. Try again."
            }
        };

        function applyTranslations() {
            const lang = i18n[currentLang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (lang[key]) {
                    el.innerHTML = lang[key].replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                }
            });
            document.querySelectorAll('[data-placeholder]').forEach(el => {
                const key = el.getAttribute('data-placeholder');
                if (lang[key]) el.placeholder = lang[key];
            });
        }

        window.selectAppLang = (l) => {
            currentLang = l;
            appLangSetting.value = l;
            applyTranslations();
            langSelector.style.opacity = '0';
            setTimeout(() => {
                langSelector.style.display = 'none';
                authPage.classList.remove('hidden');
            }, 500);
        };
        
        document.getElementById('btn-fr').onclick = () => window.selectAppLang('fr');
        document.getElementById('btn-en').onclick = () => window.selectAppLang('en');

        // Splash Sequence
        window.addEventListener('load', () => {
            const s1 = document.getElementById('splash1');
            const s2 = document.getElementById('splash2');
            setTimeout(() => s1.classList.add('active'), 500);
            setTimeout(() => { s1.classList.remove('active'); s1.classList.add('exit'); }, 1800);
            setTimeout(() => s2.classList.add('active'), 2200);
            setTimeout(() => { s2.classList.remove('active'); s2.classList.add('exit'); }, 3500);
            setTimeout(() => {
                splashScreen.style.opacity = '0';
                setTimeout(() => {
                    splashScreen.style.display = 'none';
                    langSelector.style.display = 'flex';
                }, 1000);
            }, 4500);
        });

        // Auth Process
        document.getElementById('unlockBtn').onclick = async () => {
            document.getElementById('unlockBtn').innerHTML = '<i class="fas fa-sync fa-spin"></i>';
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                user = u;
                profIdDisplay.innerText = `ID: ${user.uid}`;
                authPage.classList.add('hidden');
                loadingOverlay.style.display = 'flex';
                
                let progress = 0;
                const interval = setInterval(() => {
                    progress += 4;
                    document.getElementById('postAuthProgress').style.width = progress + '%';
                    if (progress >= 100) {
                        clearInterval(interval);
                        setTimeout(() => {
                            loadingOverlay.style.opacity = '0';
                            setTimeout(() => {
                                loadingOverlay.style.display = 'none';
                                mainApp.classList.remove('hidden');
                                mainApp.classList.add('flex');
                                setupRealtime();
                            }, 500);
                        }, 300);
                    }
                }, 30);

                const dnaDoc = await getDoc(doc(db, "artifacts", appId, "users", user.uid, "settings", "dna"));
                if (dnaDoc.exists()) {
                    dnaPrompt = dnaDoc.data().prompt;
                    document.getElementById('customDNA').value = dnaPrompt;
                }
            }
        });

        document.getElementById('saveDNA').onclick = async () => {
            if (!user) return;
            const btn = document.getElementById('saveDNA');
            btn.innerHTML = '<i class="fas fa-check"></i>';
            dnaPrompt = document.getElementById('customDNA').value;
            await setDoc(doc(db, "artifacts", appId, "users", user.uid, "settings", "dna"), { prompt: dnaPrompt });
            setTimeout(() => btn.innerText = i18n[currentLang].saveBtn, 2000);
        };

        function setupRealtime() {
            if (!user) return;
            const q = query(collection(db, "artifacts", appId, "users", user.uid, "chats"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                const messages = [];
                snap.forEach(d => messages.push({id: d.id, ...d.data()}));
                
                if (messages.length === 0) {
                    displayAIMessage(i18n[currentLang].intro, true);
                }

                if (messages.length > currentMessages.length) {
                    const latest = messages[messages.length - 1];
                    if (latest.newlyAdded) {
                        displayAIMessage(latest.ai, true);
                    } else {
                        conversationContainer.innerHTML = '';
                        messages.forEach(m => {
                            displayUserMessage(m.user);
                            displayAIMessage(m.ai, false);
                        });
                    }
                    currentMessages = messages;
                    chatArea.scrollTop = chatArea.scrollHeight;
                }
            }, (err) => console.error("Firestore Error:", err));
        }

        function displayUserMessage(text) {
            const div = document.createElement('div');
            div.className = "flex justify-end w-full";
            div.innerHTML = `<div class="bg-white/5 border border-white/10 px-6 py-3 rounded-2xl text-sm message-bubble text-white shadow-lg">${text}</div>`;
            conversationContainer.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function displayAIMessage(text, animate) {
            const wrap = document.createElement('div');
            wrap.className = "flex flex-col gap-3 w-full";
            const content = document.createElement('div');
            content.className = "prose prose-invert prose-sm text-slate-300 max-w-full message-bubble";
            wrap.appendChild(content);
            conversationContainer.appendChild(wrap);
            if (animate) streamText(content, text); else content.innerHTML = marked.parse(text);
        }

        function streamText(container, text) {
            let i = 0; container.innerHTML = '';
            const interval = setInterval(() => {
                if (i < text.length) {
                    container.innerHTML = marked.parse(text.substring(0, i + 1));
                    i += 4; chatArea.scrollTop = chatArea.scrollHeight;
                } else {
                    container.innerHTML = marked.parse(text);
                    clearInterval(interval); chatArea.scrollTop = chatArea.scrollHeight;
                }
            }, 10);
        }

        async function send() {
            const val = userInput.value.trim();
            if (!val || !user) return;
            userInput.value = ''; userInput.style.height = '44px';
            displayUserMessage(val);
            document.getElementById('aiTyping').classList.remove('hidden');
            chatArea.scrollTop = chatArea.scrollHeight;

            const mode = document.getElementById('systemMode').value;
            const corePrompt = `Tu es **Thiab's** IA. Créée par **Thiab's**, développée par **LevelUp**. 
            IMPORTANT : Mets toujours les noms **Thiab's** et **LevelUp** en gras.
            LANGUE : ${currentLang === 'fr' ? 'Français' : 'Anglais'}.
            DNA : ${dnaPrompt}.
            MODE : ${mode}`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: val }] }], 
                        systemInstruction: { parts: [{ text: corePrompt }] } 
                    })
                });

                if (res.status === 429) throw new Error("quota");
                const data = await res.json();
                const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || i18n[currentLang].genError;
                document.getElementById('aiTyping').classList.add('hidden');

                await addDoc(collection(db, "artifacts", appId, "users", user.uid, "chats"), {
                    user: val, ai: aiText, timestamp: Date.now(), newlyAdded: true
                });

            } catch (e) {
                document.getElementById('aiTyping').classList.add('hidden');
                displayAIMessage(e.message === "quota" ? i18n[currentLang].quotaError : i18n[currentLang].genError, true);
            }
        }

        // Event Listeners
        userInput.oninput = function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; };
        userInput.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
        document.getElementById('sendBtn').onclick = send;
        document.getElementById('openSidebar').onclick = () => document.getElementById('sidebar').classList.remove('translate-x-full');
        document.getElementById('closeSidebar').onclick = () => document.getElementById('sidebar').classList.add('translate-x-full');
        document.getElementById('logoutBtn').onclick = () => auth.signOut().then(() => location.reload());
        document.getElementById('appLangSetting').onchange = (e) => { currentLang = e.target.value; applyTranslations(); };
        
        document.getElementById('clearHistory').onclick = async () => {
            if (!user) return;
            const snap = await getDocs(collection(db, "artifacts", appId, "users", user.uid, "chats"));
            for (const d of snap.docs) await deleteDoc(doc(db, "artifacts", appId, "users", user.uid, "chats", d.id));
            conversationContainer.innerHTML = '';
            document.getElementById('sidebar').classList.add('translate-x-full');
            displayAIMessage(i18n[currentLang].intro, true);
        };
    </script>
</body>
</html>
