<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Dégradé du fond (Violet très très sombre vers Noir profond) -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1a0b2e" />
      <stop offset="100%" stop-color="#020202" />
    </radialGradient>
    
    <!-- Dégradé de l'étoile (Violet clair vers Violet intense) -->
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8b4fe" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6b21a8" />
    </linearGradient>

    <!-- Effet de lumière (Glow Cinématique) -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Fond de l'application (S'adapte automatiquement aux bords arrondis des téléphones) -->
  <rect width="512" height="512" fill="url(#bgGrad)" />

  <!-- Étoile Parfaite avec Effet Lumineux -->
  <g transform="translate(256, 265) scale(1.4)" filter="url(#glow)">
    <path d="M 0 -110 L 31 -35 L 105 -35 L 45 12 L 68 85 L 0 40 L -68 85 L -45 12 L -105 -35 L -31 -35 Z" fill="url(#starGrad)" />
  </g>
</svg>
